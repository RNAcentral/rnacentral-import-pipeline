# This workflow runs the conversion to singularity and stores the result in the
# ghcr so we can pull it easier

name: Singularity Build
on:
  workflow_call:
    inputs:
      tag:
        description: 'Docker image tag to pull and re-publish as singularity.'
        required: false
        type: string
        default: 'latest'


jobs:
  run_conversion:
    name: "Pull docker image and convert"
    runs-on: ubuntu-latest

    container:
      image: quay.io/singularity/singularity:v3.8.1
      options: --privileged

    steps:
      - name: "Pull image"
        run: |
          singularity pull --name rnacentral-rnacentral-import-pipeline-${{ inputs.tag }}.sif docker://rnacentral/rnacentral-import-pipeline:${{ inputs.tag }}

      - name: "Push to ghcr"
        run: |
          echo ${{ secrets.GITHUB_TOKEN }} | singularity remote login -u ${{ secrets.GHCR_USERNAME }} --password-stdin oras://ghcr.io
          singularity push rnacentral-rnacentral-import-pipeline-${{ inputs.tag }}.sif oras://ghcr.io/${GITHUB_REPOSITORY}:${{ inputs.tag }}
