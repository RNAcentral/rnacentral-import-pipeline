
repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.3.0
    hooks:
    -   id: trailing-whitespace
    -   id: end-of-file-fixer
    -   id: check-yaml
-   repo: https://github.com/psf/black
    rev: 22.6.0
    hooks:
    -   id: black
-   repo: https://github.com/pycqa/isort
    rev: 5.11.5
    hooks:
    -   id: isort
        args: ["--profile", "black", "--filter-files"]
        name: isort (python)
-   repo: local
    hooks:
    -   id: rustfmt
        name: rustfmt
        entry: rustfmt
        language: system
        types: [rust]
        args: ['--edition', '2021']
